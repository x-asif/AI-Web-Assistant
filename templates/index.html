<!DOCTYPE html>
<html>

<head>

    <title>AI Voice Assistant</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <div class="main">

        <h1>AI Voice Assistant</h1>

        <div class="input-box">

            <input
                type="text"
                id="message"
                placeholder="Type your message..."
            >

            <button id="mic-btn">
                🎤
            </button>

            <button onclick="sendMessage()">
                ➤
            </button>

        </div>

        <p class="info">
            Press Enter to send • Use mic for voice input
        </p>

        <div id="chat"></div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
